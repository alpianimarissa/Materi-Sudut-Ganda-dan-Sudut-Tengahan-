<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Space Quest: Double & Half Angles</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- KaTeX for beautiful math formulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #030712;
            color: #f3f4f6;
            overflow-x: hidden;
        }
        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }
        .font-code {
            font-family: 'Fira Code', monospace;
        }
        /* Neon effects */
        .neon-border-cyan {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            border: 1px solid rgba(6, 182, 212, 0.8);
        }
        .neon-border-pink {
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
            border: 1px solid rgba(236, 72, 153, 0.8);
        }
        .neon-text-cyan {
            text-shadow: 0 0 8px rgba(6, 182, 212, 0.8);
        }
        .neon-text-pink {
            text-shadow: 0 0 8px rgba(236, 72, 153, 0.8);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }
        ::-webkit-scrollbar-thumb {
            background: #06b6d4;
            border-radius: 3px;
        }
        .slide-enter {
            animation: slideIn 0.35s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Pulsing grid background */
        .grid-bg {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(6, 182, 212, 0.04) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(6, 182, 212, 0.04) 1px, transparent 1px);
        }
        
        /* KaTeX spacing optimization to prevent awkward huge gaps */
        .katex-display {
            margin: 0.4em 0 !important;
            padding: 0 !important;
        }
        .katex {
            font-size: 1.05em;
        }
    </style>
</head>
<body class="grid-bg min-h-screen flex flex-col justify-between">

    <!-- TOP NAV / STAT BAR -->
    <header class="border-b border-cyan-500/20 bg-gray-950/80 backdrop-blur-md px-6 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-lg bg-cyan-950 border border-cyan-500 flex items-center justify-center neon-border-cyan animate-pulse">
                    <i data-lucide="orbit" class="text-cyan-400 w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-orbitron font-bold text-lg text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500 tracking-wider">TRIG-NAVIGATOR v3.0</h1>
                    <p class="text-xs text-gray-400 font-code">PHASE 3: DOUBLE & HALF ANGLES • TRANSISI SMA</p>
                </div>
            </div>
            
            <!-- XP & LEVEL PROGRESS -->
            <div class="flex items-center space-x-6">
                <div class="text-right">
                    <span class="text-xs text-gray-400 font-code block">OPERATIONAL RATING</span>
                    <span class="text-sm font-bold text-pink-400 font-orbitron animate-pulse" id="rating-text">CHIP_COMPATIBLE</span>
                </div>
                <div class="bg-gray-900 border border-gray-800 rounded-full px-4 py-1.5 flex items-center space-x-2">
                    <i data-lucide="zap" class="text-yellow-400 w-4 h-4"></i>
                    <span class="font-orbitron font-bold text-yellow-400" id="xp-counter">0 XP</span>
                </div>
                <div class="hidden sm:flex flex-col w-32">
                    <div class="flex justify-between text-[10px] text-gray-400 font-code mb-1">
                        <span>PAGE PROGRESS</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                        <div id="progress-bar" class="bg-gradient-to-r from-cyan-500 to-pink-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN QUEST CONTAINER -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center">
        <div class="bg-gray-950/70 border border-cyan-500/10 rounded-2xl p-6 backdrop-blur-lg min-h-[550px] flex flex-col justify-between slide-enter relative overflow-hidden" id="card-container">
            <!-- Neon Accent Corners -->
            <div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-cyan-500"></div>
            <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-pink-500"></div>
            <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-pink-500"></div>
            <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-cyan-500"></div>

            <!-- DYNAMIC SLIDE CONTENT -->
            <div id="slide-content" class="flex-1 flex flex-col justify-center">
                <!-- Content injected dynamically via JS -->
            </div>
        </div>
    </main>

    <!-- BOTTOM STEERING / NAVIGATION CONTROL -->
    <footer class="border-t border-cyan-500/20 bg-gray-950/95 py-4 px-6 sticky bottom-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <!-- Slide Index Explorer (Fast Nav) -->
            <div class="flex items-center space-x-2">
                <span class="text-xs text-gray-400 font-code">SECTOR:</span>
                <select id="slide-selector" onchange="jumpToSlide(this.value)" class="bg-gray-900 border border-cyan-500/30 text-cyan-400 font-orbitron rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-cyan-400">
                    <!-- Dropdown options populated by JS -->
                </select>
                <span class="text-xs text-gray-500 font-code" id="page-num-indicator">PAGE 1/35</span>
            </div>

            <!-- Nav Buttons -->
            <div class="flex items-center space-x-4 w-full sm:w-auto justify-end">
                <button onclick="prevSlide()" id="btn-prev" class="px-5 py-2 rounded-lg bg-gray-900 border border-cyan-500/40 text-cyan-400 hover:bg-cyan-500/10 transition flex items-center space-x-2 font-orbitron disabled:opacity-30 disabled:pointer-events-none">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span>BACK</span>
                </button>
                <button onclick="nextSlide()" id="btn-next" class="px-6 py-2 rounded-lg bg-gradient-to-r from-cyan-500 to-pink-500 text-white font-bold hover:brightness-110 transition flex items-center space-x-2 font-orbitron neon-border-cyan">
                    <span>NEXT</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </footer>

    <!-- INTERACTIVE GAME LOGIC SCRIPT -->
    <script>
        // Global Game State
        let currentSlide = 0;
        let xp = 0;
        let scoreQuest = [false, false, false, false, false, false, false]; // Track exercises progress
        let username = "AstralRanger";

        // 35 Pages Complete Curriculum Matrix with fully double-escaped LaTeX formulas
        const slides = [
            // SECTOR 01: INTRO & OBJECTIVES (1-3)
            {
                id: 1,
                title: "Cyberpunk Space Quest: Phase 3",
                subtitle: "Sudut Ganda & Sudut Tengahan",
                type: "hero",
                content: `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                        <div class="space-y-4">
                            <span class="px-3 py-1 bg-cyan-950 border border-cyan-500 text-cyan-400 text-xs font-code rounded">MODUL TRIG-ADVANCE ONLINE</span>
                            <h2 class="text-4xl md:text-5xl font-orbitron font-extrabold tracking-wider neon-text-cyan">THE NEXT WAVE</h2>
                            <p class="text-gray-300 leading-relaxed text-sm">
                                Selamat datang kembali, Navigator! Kamu telah menguasai jumlah, selisih, dan perkalian fungsi trigonometri. Namun, radar kapal kita mendeteksi anomali fraktal bintang yang berputar ganda dan paruh sudut!
                            </p>
                            <p class="text-xs text-gray-400 leading-relaxed">
                                Di babak ini, kita akan membongkar rumus eksak untuk Sudut Ganda ($2\\alpha$) and Sudut Tengahan ($\\frac{1}{2}\\alpha$) menggunakan landasan matematis super presisi. Bersiaplah untuk menaikkan level kecerdasan koordinatmu!
                            </p>
                            <div class="flex space-x-4">
                                <button onclick="nextSlide();" class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-pink-500 rounded-lg text-white font-bold font-orbitron hover:shadow-lg hover:shadow-cyan-500/30 transition flex items-center space-x-2">
                                    <span>MULAI MISI</span>
                                    <i data-lucide="compass" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex justify-center">
                            <!-- Glowing Reactor Engine SVG -->
                            <svg class="w-64 h-64 md:w-80 md:h-80 animate-[spin_30s_linear_infinite]" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="100" cy="100" r="95" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="10 5" />
                                <circle cx="100" cy="100" r="75" stroke="#db2777" stroke-width="3" stroke-dasharray="30 15" />
                                <circle cx="100" cy="100" r="55" stroke="#06b6d4" stroke-width="1" />
                                <polygon points="100,25 165,138 35,138" stroke="#facc15" stroke-width="2" fill="rgba(250, 204, 21, 0.04)" />
                                <polygon points="100,175 165,62 35,62" stroke="#06b6d4" stroke-width="1" fill="rgba(6, 182, 212, 0.04)" />
                                <circle cx="100" cy="100" r="8" fill="#e11d48" class="animate-ping" />
                            </svg>
                        </div>
                    </div>
                `
            },
            {
                id: 2,
                title: "Otorisasi ID Navigator",
                type: "input-form",
                content: `
                    <div class="max-w-md mx-auto space-y-6">
                        <div class="text-center">
                            <i data-lucide="lock" class="w-12 h-12 text-pink-500 mx-auto mb-2"></i>
                            <h3 class="text-2xl font-orbitron font-bold text-white">DEKRIF OPERATOR BARU</h3>
                            <p class="text-xs text-gray-400 font-code">Registrasikan Callsign navigasimu untuk melisensi modul.</p>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <label class="text-xs font-code text-cyan-400 block mb-1">CALLSIGN CODENAME</label>
                                <input id="nav-name" type="text" value="AstralRanger" class="w-full bg-gray-900 border border-cyan-500/50 rounded-lg p-3 text-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 font-code">
                            </div>
                            <button onclick="saveProfile()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold font-orbitron rounded-lg transition neon-border-cyan">
                                VERIFIKASI CODENAME
                            </button>
                        </div>
                    </div>
                `
            },
            {
                id: 3,
                title: "Tujuan Sektor Pembelajaran (Fase F)",
                type: "info",
                content: `
                    <div class="space-y-6">
                        <h3 class="text-2xl font-orbitron font-bold text-cyan-400">Peta Kemampuan Fase F Kurikulum Merdeka</h3>
                        <p class="text-sm text-gray-300">
                            Navigator pintar dituntut menguasai tiga domain keahlian di Sektor 3 ini:
                        </p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="p-4 bg-gray-900/50 border border-gray-800 rounded-xl space-y-2">
                                <span class="text-pink-500 font-bold font-orbitron text-lg">01</span>
                                <h4 class="font-bold text-white">Analisis Sudut Ganda</h4>
                                <p class="text-xs text-gray-400 leading-relaxed">Menguraikan sudut bertingkat $2\\alpha$ menjadi fungsi tunggal tanpa tabel kalkulator.</p>
                            </div>
                            <div class="p-4 bg-gray-900/50 border border-gray-800 rounded-xl space-y-2">
                                <span class="text-cyan-400 font-bold font-orbitron text-lg">02</span>
                                <h4 class="font-bold text-white">Analisis Sudut Paruh</h4>
                                <p class="text-xs text-gray-400 leading-relaxed">Menembus pembelokan sudut $\\frac{1}{2}\\alpha$ dari nilai kosinus sudut referensi dasar.</p>
                            </div>
                            <div class="p-4 bg-gray-900/50 border border-gray-800 rounded-xl space-y-2">
                                <span class="text-yellow-400 font-bold font-orbitron text-lg">03</span>
                                <h4 class="font-bold text-white">Manipulasi Identitas</h4>
                                <p class="text-xs text-gray-400 leading-relaxed">Membuktikan keabsahan fungsi trigonometri fraktal secara murni dan logis.</p>
                            </div>
                        </div>
                        <div class="bg-cyan-950/20 border border-cyan-500/30 p-3 rounded-lg text-xs font-code text-cyan-400">
                            <strong>[NAV-INFO]</strong>: Pembelajaran ini adalah prasyarat krusial sebelum kamu mempelajari limit trigonometri dan kalkulus turunan di tingkat selanjutnya.
                        </div>
                    </div>
                `
            },

            // SECTOR 02: WARM-UP (4 SOAL) (4-7)
            {
                id: 4,
                title: "Warm-Up Quest 1: Sudut Istimewa Dasar",
                type: "quiz",
                content: `
                    <div class="space-y-4">
                        <p class="text-lg text-gray-200">Berapakah nilai eksak dari perkalian berikut?</p>
                        <div class="my-4 p-4 bg-gray-900/60 rounded-lg text-center text-2xl font-orbitron text-pink-400">
                            $$\\sin 30^\\circ \\cdot \\cos 30^\\circ = \\dots$$
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <button onclick="answerWarm(1, true)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left font-orbitron text-cyan-300">
                                A. $$\\frac{1}{4}\\sqrt{3}$$
                            </button>
                            <button onclick="answerWarm(1, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left font-orbitron text-cyan-300">
                                B. $$\\frac{1}{2}\\sqrt{3}$$
                            </button>
                            <button onclick="answerWarm(1, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left font-orbitron text-cyan-300">
                                C. $$\\frac{1}{4}$$
                            </button>
                            <button onclick="answerWarm(1, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left font-orbitron text-cyan-300">
                                D. $$\\frac{1}{2}$$
                            </button>
                        </div>
                        <div id="warm1-feedback" class="mt-4 hidden p-3 rounded-lg text-sm font-code"></div>
                    </div>
                `
            },
            {
                id: 5,
                title: "Warm-Up Quest 2: Identitas Kuadrat",
                type: "quiz",
                content: `
                    <div class="space-y-4">
                        <p class="text-lg text-gray-200">Gunakan Identitas Pythagoras dasar untuk mencari hubungan berikut:</p>
                        <div class="my-4 p-4 bg-gray-900/60 rounded-lg text-center text-2xl font-orbitron text-yellow-400">
                            $$1 - \\cos^2 \\alpha = \\dots$$
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <button onclick="answerWarm(2, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left font-orbitron text-cyan-300">
                                A. $$\\cos^2 \\alpha$$
                            </button>
                            <button onclick="answerWarm(2, true)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left font-orbitron text-cyan-300">
                                B. $$\\sin^2 \\alpha$$
                            </button>
                            <button onclick="answerWarm(2, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left font-orbitron text-cyan-300">
                                C. $$\\tan^2 \\alpha$$
                            </button>
                            <button onclick="answerWarm(2, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left font-orbitron text-cyan-300">
                                D. $$-\\sin^2 \\alpha$$
                            </button>
                        </div>
                        <div id="warm2-feedback" class="mt-4 hidden p-3 rounded-lg text-sm font-code"></div>
                    </div>
                `
            },
            {
                id: 6,
                title: "Warm-Up Quest 3: Rumus Jumlah Sudut Sinus",
                type: "quiz",
                content: `
                    <div class="space-y-4">
                        <p class="text-lg text-gray-200">Ingat kembali rumus dasar jumlah sudut untuk sinus:</p>
                        <div class="my-4 p-4 bg-gray-900/60 rounded-lg text-center text-2xl font-orbitron text-cyan-400">
                            $$\\sin(\\alpha + \\beta) = \\dots$$
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <button onclick="answerWarm(3, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left text-xs font-code text-cyan-300">
                                A. $$\\cos\\alpha\\cos\\beta - \\sin\\alpha\\sin\\beta$$
                            </button>
                            <button onclick="answerWarm(3, true)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left text-xs font-code text-cyan-300">
                                B. $$\\sin\\alpha\\cos\\beta + \\cos\\alpha\\sin\\beta$$
                            </button>
                            <button onclick="answerWarm(3, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left text-xs font-code text-cyan-300">
                                C. $$\\sin\\alpha\\cos\\beta - \\cos\\alpha\\sin\\beta$$
                            </button>
                            <button onclick="answerWarm(3, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-left text-xs font-code text-cyan-300">
                                D. $$\\cos\\alpha\\cos\\beta + \\sin\\alpha\\sin\\beta$$
                            </button>
                        </div>
                        <div id="warm3-feedback" class="mt-4 hidden p-3 rounded-lg text-sm font-code"></div>
                    </div>
                `
            },
            {
                id: 7,
                title: "Warm-Up Quest 4: Aturan Tanda Kuadran IV",
                type: "quiz",
                content: `
                    <div class="space-y-4">
                        <p class="text-lg text-gray-200">Jika sudut $\\alpha$ berada di Kuadran IV ($270^\\circ < \\alpha < 360^\\circ$), manakah yang bernilai positif?</p>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="answerWarm(4, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-center font-orbitron text-cyan-300">
                                A. $\\sin\\alpha$
                            </button>
                            <button onclick="answerWarm(4, true)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-center font-orbitron text-cyan-300">
                                B. $\\cos\\alpha$
                            </button>
                            <button onclick="answerWarm(4, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-center font-orbitron text-cyan-300">
                                C. $\\tan\\alpha$
                            </button>
                            <button onclick="answerWarm(4, false)" class="p-4 bg-gray-900 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition text-center font-orbitron text-cyan-300">
                                D. Tidak ada yang positif
                            </button>
                        </div>
                        <div id="warm4-feedback" class="mt-4 hidden p-3 rounded-lg text-sm font-code"></div>
                    </div>
                `
            },

            // SECTOR 03: REAL-WORLD CONNECTIONS (3 EXAMPLES) (8-10)
            {
                id: 8,
                title: "Dunia Nyata 1: Robotika Berengsel Ganda",
                type: "info",
                content: `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                        <div class="space-y-3">
                            <h3 class="text-2xl font-orbitron font-bold text-cyan-400">Kinematika Lengan Robot</h3>
                            <p class="text-sm text-gray-300 leading-relaxed">
                                Pada pabrik perakitan mobil futuristik, lengan robot bergerak dengan sudut berengsel ganda. Ketika sendi motor pertama berputar sejauh $\\alpha$ dan sendi kedua menyelaraskan sudut sebesar $2\\alpha$, komputer pusat harus menghitung koordinat ujung pencengkeram secara instan.
                            </p>
                            <p class="text-xs text-gray-400 font-code">
                                Alih-alih menghitung dua koordinat rotasi terpisah yang memperlambat laju CPU, sistem menggunakan rumus sudut ganda untuk mengonversinya langsung menjadi satu baris instruksi linear!
                            </p>
                        </div>
                        <div class="flex justify-center">
                            <!-- Robotic Arm SVG -->
                            <svg class="w-48 h-48" viewBox="0 0 100 100">
                                <circle cx="10" cy="90" r="8" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
                                <line x1="10" y1="90" x2="45" y2="55" stroke="#06b6d4" stroke-width="4"/>
                                <circle cx="45" cy="55" r="6" fill="#1e293b" stroke="#db2777" stroke-width="2"/>
                                <line x1="45" y1="55" x2="85" y2="40" stroke="#db2777" stroke-width="3"/>
                                <path d="M 85,35 L 85,45 L 90,40 Z" fill="#facc15"/>
                                <text x="32" y="80" fill="#f3f4f6" font-family="Orbitron" font-size="8">α</text>
                                <text x="65" y="45" fill="#f3f4f6" font-family="Orbitron" font-size="8">2α</text>
                            </svg>
                        </div>
                    </div>
                `
            },
            {
                id: 9,
                title: "Dunia Nyata 2: Desain Satelit Pelacak Sudut Paruh",
                type: "info",
                content: `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                        <div class="space-y-3">

            feedback.classList.remove("hidden");
            if (isCorrect) {
                feedback.innerHTML = "🎯 Benar! $6\\sin 15^\\circ\\cos 15^\\circ$ adalah $3 \\cdot (2\\sin 15^\\circ\\cos 15^\\circ) = 3\\sin 30^\\circ$.";
                feedback.className = "mt-4 p-3 rounded-lg text-sm font-code bg-green-950/40 border border-green-500/30 text-green-400";
                safeRenderMath(feedback);
                xp += 150;
                updateXP();
            } else {
                feedback.innerHTML = "❌ Salah. Pola $2\\sin A\\cos A$ adalah bentuk ganda.";
                feedback.className = "mt-4 p-3 rounded-lg text-sm font-code bg-red-950/40 border border-red-500/30 text-red-400";
                safeRenderMath(feedback);
            }
        }

        // Double Angle Canvas Laboratory Draw
        function updateDoubleLab() {
            const alphaDeg = parseInt(document.getElementById("slide-alpha").value);
            document.getElementById("val-alpha").innerText = alphaDeg;

            const alpha = (alphaDeg * Math.PI) / 180;
            const alphaDouble = 2 * alpha;

            // Math outputs - separated completely from LaTeX syntax
            const sA = Math.sin(alpha).toFixed(2);
            const cA = Math.cos(alpha).toFixed(2);
            const s2A = (2 * sA * cA).toFixed(2);

            // Safe update elements directly
            document.getElementById("out-sin-a").innerText = sA;
            document.getElementById("out-cos-a").innerText = cA;
            document.getElementById("out-sin-2a").innerText = s2A;

            // Draw on canvas
            const canvas = document.getElementById("doubleCanvas");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = 85;

            // Circle boundary
            ctx.strokeStyle = "rgba(255,255,255,0.08)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.stroke();

            // Axes
            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.beginPath();
            ctx.moveTo(cx - r - 10, cy); ctx.lineTo(cx + r + 10, cy);
            ctx.moveTo(cx, cy - r - 10); ctx.lineTo(cx, cy + r + 10);
            ctx.stroke();

            // Draw line alpha (Cyan)
            ctx.strokeStyle = "#22d3ee";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + r * Math.cos(-alpha), cy + r * Math.sin(-alpha));
            ctx.stroke();

            // Draw line alphaDouble (Pink/Red)
            ctx.strokeStyle = "#ec4899";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + r * Math.cos(-alphaDouble), cy + r * Math.sin(-alphaDouble));
            ctx.stroke();
        }

        // Half Angle Canvas Laboratory Draw
        function updateHalfLab() {
            const alphaHalfDeg = parseInt(document.getElementById("slide-alpha-half").value);
            document.getElementById("val-alpha-half").innerText = alphaHalfDeg;

            const alpha = (alphaHalfDeg * Math.PI) / 180;
            const alphaHalf = alpha / 2;

            // Math outputs - separated completely from LaTeX syntax
            const cA = Math.cos(alpha).toFixed(2);
            const sHalf = Math.sin(alphaHalf).toFixed(2);

            // Safe update elements directly
            document.getElementById("out-cos-half").innerText = cA;
            document.getElementById("out-sin-half-calc").innerText = sHalf;

            // Draw
            const canvas = document.getElementById("halfCanvas");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = 85;

            // Circle
            ctx.strokeStyle = "rgba(255,255,255,0.08)";
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.stroke();

            // Axes
            ctx.strokeStyle = "rgba(255,255,255,0.15)";
            ctx.beginPath();
            ctx.moveTo(cx - r - 10, cy); ctx.lineTo(cx + r + 10, cy);
            ctx.moveTo(cx, cy - r - 10); ctx.lineTo(cx, cy + r + 10);
            ctx.stroke();

            // Draw line alpha (Pink)
            ctx.strokeStyle = "#ec4899";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + r * Math.cos(-alpha), cy + r * Math.sin(-alpha));
            ctx.stroke();

            // Draw line alphaHalf (Yellow)
            ctx.strokeStyle = "#facc15";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + r * Math.cos(-alphaHalf), cy + r * Math.sin(-alphaHalf));
            ctx.stroke();
        }

        // Exercise Question Handler
        function answerQuest(questIdx, isCorrect) {
            const feedback = document.getElementById(`quest${questIdx}-feedback`);
            feedback.classList.remove("hidden");
            if (isCorrect) {
                feedback.innerHTML = "🎯 BENAR! Analisis koordinat trigonometrimu sangat presisi!";
                feedback.className = "p-2.5 rounded font-code text-xs bg-green-950/40 border border-green-500/30 text-green-400 mt-2";
                if (!scoreQuest[questIdx]) {
                    xp += 150;
                    scoreQuest[questIdx] = true;
                    updateXP();
                }
            } else {
                feedback.innerHTML = "❌ SALAH. Perhitungan menyimpang. Coba cermati lagi aturan kuadrannya.";
                feedback.className = "p-2.5 rounded font-code text-xs bg-red-950/40 border border-red-500/30 text-red-400 mt-2";
            }
        }

        // Self-Assessment Rating
        function selectRating(status, ratingCode, bonusXP) {
            document.getElementById("rating-text").innerText = ratingCode;
            document.getElementById("rating-feedback").innerHTML = `Scanner Sukses! Status Kamu: <strong>${status}</strong> (+${bonusXP} XP).`;
            xp += bonusXP;
            updateXP();
        }

    </script>
